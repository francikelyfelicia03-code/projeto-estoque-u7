<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockControl - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div style="font-weight: bold; margin-bottom: 5px;">STOCKCONTROL</div>
        <input type="checkbox" id="menu-check">
        <label for="menu-check" class="btn-abrir">☰ MENU</label>
        <label for="menu-check" class="btn-fechar">✖ FECHAR</label>
        <nav class="menu-nav">
            <ul style="list-style: none; padding: 10px; margin: 10px 0; background: white; border: 1px solid #ccc;">

    <main>
        <div class="bloco-titulo"><h2>Cadastro de Software</h2></div>
        <div class="faixa-cinza">
